<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geodo</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>Geodo</h1>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="stats">
      <span class="stat-number" id="event-count">0</span>
      <span class="stat-label">events captured</span>
    </div>

    <div class="config">
      <label class="config-label">Backend URL</label>
      <input type="text" id="api-url-input" placeholder="http://localhost:3000">
      <label class="config-label" style="margin-top:8px">API Key</label>
      <input type="password" id="api-key-input" placeholder="geodo_dev_2026">
      <div class="button-row">
        <button id="save-btn">Save</button>
        <button id="open-insights">Insights</button>
      </div>
    </div>
  </div>
  <script type="module" src="popup.ts"></script>
</body>
</html>
