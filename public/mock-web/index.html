<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geodo Insights</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 32px;
    }
    h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 4px; }
    .backend-status { font-size: 12px; margin-bottom: 28px; }
    .section { margin-bottom: 32px; }
    .section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: #666; margin-bottom: 12px;
    }
    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 10px; padding: 16px; margin-bottom: 12px;
    }
    .card-title { font-size: 13px; color: #888; margin-bottom: 8px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: #2a2a2a; border-radius: 4px; padding: 3px 8px; font-size: 12px; color: #ccc; }
    .tag.strong { background: #1e3a8a; color: #93c5fd; }
    .stat-row { display: flex; gap: 24px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; color: #fff; display: block; }
    .stat-lbl { font-size: 11px; color: #666; }
    .query-box { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="text"] {
      flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
      color: #e0e0e0; font-size: 14px; padding: 10px 14px;
    }
    input[type="text"]:focus { outline: none; border-color: #2563eb; }
    button {
      background: #2563eb; border: none; border-radius: 6px; color: #fff;
      font-size: 14px; font-weight: 500; padding: 10px 18px; cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .answer-box {
      background: #1a1a1a; border: 1px solid #2563eb33; border-radius: 8px;
      padding: 16px; font-size: 14px; line-height: 1.6; color: #d1d5db;
      white-space: pre-wrap; min-height: 60px;
    }
    .event-log { max-height: 300px; overflow-y: auto; font-size: 12px; font-family: monospace; }
    .event-row {
      padding: 6px 10px; border-bottom: 1px solid #1a1a1a;
      display: flex; gap: 12px; align-items: baseline;
    }
    .event-row:hover { background: #1a1a1a; }
    .event-name { color: #60a5fa; min-width: 180px; }
    .event-time { color: #555; min-width: 80px; }
    .event-detail { color: #888; }
    .empty { color: #555; font-style: italic; font-size: 14px; text-align: center; padding: 32px; }
    .confidence { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
    .confidence.high { background: #14532d; color: #86efac; }
    .confidence.medium { background: #713f12; color: #fcd34d; }
    .confidence.low { background: #3b1f1f; color: #fca5a5; }
    .loading { color: #555; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <h1>Geodo Insights</h1>
  <p class="subtitle">Your LinkedIn prospecting profile</p>

  <div class="section">
    <div class="section-title">Overview</div>
    <div class="card">
      <div class="stat-row">
        <div class="stat"><span class="stat-num" id="stat-sessions">—</span><span class="stat-lbl">sessions</span></div>
        <div class="stat"><span class="stat-num" id="stat-searches">—</span><span class="stat-lbl">searches</span></div>
        <div class="stat"><span class="stat-num" id="stat-profiles">—</span><span class="stat-lbl">profiles viewed</span></div>
        <div class="stat"><span class="stat-num" id="stat-events">—</span><span class="stat-lbl">total events</span></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Targeting Profile</div>
    <div id="targeting-content"><div class="loading">Loading...</div></div>
  </div>

  <div class="section">
    <div class="section-title">Ask About This User's Prospecting</div>
    <div class="query-box">
      <input type="text" id="query-input" placeholder="e.g. What job titles do they target?" />
      <button id="ask-btn">Ask</button>
    </div>
    <div class="answer-box" id="answer-box">Ask a question above to get an evidence-based answer about this user's prospecting behavior.</div>
  </div>

  <div class="section">
    <div class="section-title">Recent Events</div>
    <div class="card event-log" id="event-log"><div class="loading">Loading events...</div></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
